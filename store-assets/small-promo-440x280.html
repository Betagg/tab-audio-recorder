<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dolphin Tab Audio Recorder Promo Tile</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        width: 440px;
        height: 280px;
        margin: 0;
        overflow: hidden;
        background: linear-gradient(135deg, #5a9dee 0%, #72d8e1 100%);
        color: #ffffff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .tile {
        position: relative;
        width: 440px;
        height: 280px;
        padding: 32px;
      }

      .icon {
        width: 68px;
        height: 68px;
        border-radius: 18px;
        box-shadow: 0 14px 34px rgba(8, 48, 86, 0.24);
      }

      h1 {
        margin: 28px 0 10px;
        max-width: 320px;
        font-size: 38px;
        line-height: 1;
        font-weight: 850;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 290px;
        color: rgba(255, 255, 255, 0.88);
        font-size: 18px;
        line-height: 1.24;
        font-weight: 650;
      }

      .rec {
        position: absolute;
        right: 34px;
        top: 34px;
        border-radius: 999px;
        background: #e5343f;
        padding: 9px 14px;
        color: #ffffff;
        font-size: 15px;
        font-weight: 900;
      }

      .wave {
        position: absolute;
        right: 30px;
        bottom: 30px;
        display: flex;
        align-items: center;
        gap: 7px;
        height: 52px;
      }

      .bar {
        width: 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
      }

      .bar:nth-child(1) { height: 16px; opacity: .55; }
      .bar:nth-child(2) { height: 30px; }
      .bar:nth-child(3) { height: 50px; }
      .bar:nth-child(4) { height: 24px; opacity: .72; }
      .bar:nth-child(5) { height: 40px; }
    </style>
  </head>
  <body>
    <main class="tile">
      <img class="icon" src="../extension/assets/icon.svg" alt="">
      <div class="rec">REC</div>
      <h1>Save tab audio as MP3</h1>
      <p>No screen recording. No uploads. Just click record.</p>
      <div class="wave">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </main>
  </body>
</html>
